            <script>
                //Show cart count
                var count = localStorage.getItem("cartCount") || 0;
                document.querySelector(".price b") .innerText = count;

                // Show item from URL
                var params = new URLSearchParams(window.locatio.search);
                var item = params.get("item");
                var price = params.get("price");

                if (item && price) {
                    document.getElementById("cart-items").innerHTML = 
                    "<p>🛒 " + item +" - P" + price + " added to cart</p>";
                } else {
                    document.getElementById("cart-items") .innerHTML =
                    "<p>You cart is empty.</p>";
                }
            </script>
